services:
  chrome:
    build:
      context: .
    container_name: ${CONTAINER_NAME:-chrome-sandbox}
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-Etc/UTC}
      CHROME_DEBUG_ADDRESS: ${CHROME_DEBUG_ADDRESS:-127.0.0.1}
      CHROME_DEBUG_PORT: ${CHROME_DEBUG_PORT:-9222}
      CHROME_USER_DATA_DIR: ${CHROME_USER_DATA_DIR:-/config/chrome-debug-profile}
      EXTRA_CHROME_CLI: ${EXTRA_CHROME_CLI:-}
      CHROME_CLI: ${CHROME_USER_DATA_DIR:-/config/chrome-debug-profile} --remote-debugging-address=${CHROME_DEBUG_ADDRESS:-127.0.0.1} --remote-debugging-port=${CHROME_DEBUG_PORT:-9222} --remote-allow-origins=* ${EXTRA_CHROME_CLI:-}
      CDP_PROXY_BIND_ADDRESS: ${CDP_PROXY_BIND_ADDRESS:-0.0.0.0}
      CDP_PROXY_PORT: ${CDP_PROXY_PORT:-9223}
    ports:
      - "${WEB_HTTP_PORT:-3000}:3000"
      - "${WEB_HTTPS_PORT:-3001}:3001"
      - "${CDP_PROXY_PORT:-9223}:${CDP_PROXY_PORT:-9223}"
    volumes:
      - ./config:/config
    shm_size: ${CHROME_SHM_SIZE:-1gb}
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --fail http://127.0.0.1:${CDP_PROXY_PORT:-9223}/json/version >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 5
    restart: unless-stopped
